<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Purchase</title>
  <style>body{margin:0;font-family:Arial,sans-serif;background:#111827;color:#f8fafc}.container{max-width:520px;margin:5vh auto;padding:2rem;background:#1f2937;border-radius:16px;box-shadow:0 16px 40px rgba(0,0,0,.35)}h1{margin:0 0 1rem;color:#38bdf8}label{display:block;margin:.9rem 0 .25rem;font-weight:700}input,select{width:100%;padding:.9rem;border:1px solid #334155;border-radius:10px;background:#0f172a;color:#e2e8f0}.button{display:inline-block;margin-top:1.3rem;padding:.95rem 1.6rem;background:#22c55e;color:#0f172a;text-decoration:none;border-radius:999px;font-weight:700}.button:hover{background:#16a34a}</style>
</head>
<body>
  <div class="container">
    <h1>Buy Your Game Pass</h1>
    <label for="package">Select Package</label>
    <select id="package">
      <option>Starter Pack - $9.99</option>
      <option>Pro Pass - $19.99</option>
      <option>Ultimate Bundle - $29.99</option>
    </select>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="player@example.com" />
    <a href="#" class="button">Complete Purchase</a>
  </div>
</body>
</html>
